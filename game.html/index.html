<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  -  SAIFULLAH'S Chrome/Google Photos Import</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Saifullah's image gallery</h1>
            <p>Import Chrome/Google images + Search + URL uploads</p>
        </div>

        <div class="controls-section">
        <div class="search-section">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search images... (local or web)">
            <div class="web-toggle" id="webToggle">
                <input type="checkbox" id="webSearchCheckbox">
                <label for="webSearchCheckbox">🌐 Web Search</label>
            </div>
            <div class="search-stats" id="searchStats">All images loaded</div>
        </div>
            
            <div class="action-buttons">
                <button class="import-btn" id="importChromeBtn">📱 Import Chrome Images</button>
                <button class="import-btn" id="importGoogleBtn">🌐 Import Google Photos</button>
                <button class="clear-btn" id="clearAllBtn">🗑️ Clear All</button>
            </div>
        </div>

        <div class="upload-section">
            <form class="upload-form" id="uploadForm">
                <input type="url" class="url-input" id="imageUrl" placeholder="Paste image URL here...">
                <button type="submit" class="upload-btn">➕ Add Image</button>
            </form>
        </div>

        <div class="gallery" id="gallery">
            <div class="empty-state">
                <div>📷</div>
                <h3>No images yet</h3>
                <p>Import Chrome images or add URLs to get started!</p>
            </div>
        </div>
    </div>

    <!-- Fullscreen Modal -->
    <div class="modal" id="imageModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <img id="modalImage" src="" alt="Full size image">
    </div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const imageUrlInput = document.getElementById('imageUrl');
        const gallery = document.getElementById('gallery');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const closeModal = document.getElementById('closeModal');
        const searchInput = document.getElementById('searchInput');
        const searchStats = document.getElementById('searchStats');
        const webToggle = document.getElementById('webToggle');
        const webSearchCheckbox = document.getElementById('webSearchCheckbox');
        const importChromeBtn = document.getElementById('importChromeBtn');
        const importGoogleBtn = document.getElementById('importGoogleBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        let allImages = JSON.parse(localStorage.getItem('galleryImages')) || [];
        let filteredImages = [...allImages];
        let webImages = [];
        let isWebSearch = false;

        // Import Chrome Downloads & Screenshots
        async function importChromeImages() {
            try {
                importChromeBtn.textContent = '⏳ Importing...';
                importChromeBtn.disabled = true;

                // Chrome Downloads folder (common paths)
                const chromePaths = [
                    'C:\\Users\\{username}\\Downloads\\', // Windows
                    '/home/{username}/Downloads/', // Linux
                    '/Users/{username}/Downloads/' // Mac
                ];

                // Get images from Downloads (simulated - in real browser this would scan folders)
                const chromeImages = await getChromeDownloadsImages();
                
                allImages.unshift(...chromeImages);
                saveImages();
                renderGallery();
                
                importChromeBtn.textContent = `✅ Imported ${chromeImages.length} images`;
                setTimeout(() => {
                    importChromeBtn.textContent = '📱 Import Chrome Images';
                    importChromeBtn.disabled = false;
                }, 2000);
            } catch (error) {
                console.error('Chrome import failed:', error);
                importChromeBtn.textContent = '❌ Import Failed';
                setTimeout(() => {
                    importChromeBtn.textContent = '📱 Import Chrome Images';
                    importChromeBtn.disabled = false;
                }, 2000);
            }
        }

        // Import Google Photos (via PWA or web access)
        async function importGooglePhotos() {
            try {
                importGoogleBtn.textContent = '⏳ Importing...';
                importGoogleBtn.disabled = true;

                // Simulate Google Photos import (in real app would use Google Photos API)
                const googleImages = await getGooglePhotosImages();
                
                allImages.unshift(...googleImages);
                saveImages();
                renderGallery();
                
                importGoogleBtn.textContent = `✅ Imported ${googleImages.length} images`;
                setTimeout(() => {
                    importGoogleBtn.textContent = '🌐 Import Google Photos';
                    importGoogleBtn.disabled = false;
                }, 2000);
            } catch (error) {
                console.error('Google Photos import failed:', error);
                importGoogleBtn.textContent = '❌ Import Failed';
                setTimeout(() => {
                    importGoogleBtn.textContent = '🌐 Import Google Photos';
                    importGoogleBtn.disabled = false;
                }, 2000);
            }
        }

        // Simulated Chrome Downloads images (replace with File System Access API for real)
        async function getChromeDownloadsImages() {
            // Demo images from common Chrome download sources
            return [
                { url: 'https://picsum.photos/400/300?random=1', name: 'screenshot-2024-01-15.png', date: '2024-01-15', source: 'Chrome Downloads' },
                { url: 'https://picsum.photos/400/300?random=2', name: 'photo-downloaded.jpg', date: '2024-01-14', source: 'Chrome Downloads' },
                { url: 'https://picsum.photos/400/300?random=3', name: 'image-from-web.png', date: '2024-01-13', source: 'Chrome Downloads' },
                { url: 'https://picsum.photos/400/300?random=4', name: 'screenshot-2024-01-12.jpg', date: '2024-01-12', source: 'Chrome Downloads' }
            ];
        }

        // Simulated Google Photos images
        async function getGooglePhotosImages() {
            return [
                { url: 'https://picsum.photos/400/300?random=5', name: 'vacation-2023.jpg', date: '2023-12-25', source: 'Google Photos' },
                { url: 'https://picsum.photos/400/300?random=6', name: 'family-photo.png', date: '2023-12-24', source: 'Google Photos' },
                { url: 'https://picsum.photos/400/300?random=7', name: 'party-2023.jpg', date: '2023-12-31', source: 'Google Photos' }
            ];
        }

        // Search functionality
        async function performSearch(query) {
            const webMode = webSearchCheckbox.checked;
            
            if (!query.trim()) {
                if (webMode) {
                    webImages = [];
                } else {
                    filteredImages = [...allImages];
                }
            } else if (webMode) {
                // Web search mode
                await searchWebImages(query);
                filteredImages = [...webImages];
            } else {
                // Local search
                const lowerQuery = query.toLowerCase();
                filteredImages = allImages.filter(img => 
                    img.name?.toLowerCase().includes(lowerQuery) ||
                    img.url.toLowerCase().includes(lowerQuery) ||
                    img.date?.toLowerCase().includes(lowerQuery) ||
                    img.source?.toLowerCase().includes(lowerQuery)
                );
            }
            updateSearchStats();
            renderGallery();
        }

        // Web search using Unsplash (no API key needed)
        async function searchWebImages(query) {
            try {
                searchInput.parentElement.classList.add('loading');
                
                // Generate multiple Unsplash image URLs for query (CORS-free)
                const keywords = query.toLowerCase().split(' ').filter(k => k.length > 2);
                webImages = [];
                
                for (let i = 0; i < 15; i++) {
                    const seed = keywords.join('-') + '-' + i;
                    const url = `https://source.unsplash.com/400x300/?${encodeURIComponent(query)}&sig=${i}`;
                    const name = `${query} ${i + 1}`.replace(/[^a-z0-9]/gi, '-').toLowerCase();
                    
                    webImages.push({
                        url,
                        name,
                        date: new Date().toLocaleDateString(),
                        source: 'Unsplash Web'
                    });
                }
            } catch (error) {
                console.error('Web search failed:', error);
                webImages = [{ url: 'https://via.placeholder.com/400x300?text=Search+Error', name: 'Error', date: '', source: 'Web' }];
            } finally {
                searchInput.parentElement.classList.remove('loading');
            }
        }

        function updateSearchStats() {
            const webMode = webSearchCheckbox.checked;
            if (webMode) {
                searchStats.innerHTML = `<span class="loading" style="display: none;"></span>${webImages.length} web images`;
            } else {
                const total = allImages.length;
                const visible = filteredImages.length;
                searchStats.textContent = `${visible} of ${total} images`;
            }
        }

        // Render gallery with filtered images
        function renderGallery() {
            if (filteredImages.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state">
                        <div>🔍</div>
                        <h3>No images found</h3>
                        <p>Try a different search term or import more images</p>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = filteredImages.map((img, index) => {
                const isWeb = img.source === 'Unsplash Web';
                return `
                <div class="image-card">
                    <img src="${img.url}" alt="${img.name || 'Image'}" 
                         onerror="this.src='https://via.placeholder.com/300x250?text=No+Image';"
                         loading="lazy">
                    <div class="image-overlay">
                        <button class="full-view-btn" onclick="openModal(${index})">View Full Size</button>
                    </div>
                    <div class="card-footer">
                        <div class="image-title">${img.name || 'Untitled'}</div>
                        <div class="image-meta">
                            <span class="date">${img.date || 'Unknown'}</span>
                            <span class="source ${isWeb ? 'web' : ''}">${img.source || 'URL'}</span>
                        </div>
                        <div class="image-url">${img.url.substring(0, 50)}${img.url.length > 50 ? '...' : ''}</div>
                        ${isWeb ? `<button class="upload-web-btn" onclick="uploadWebImage(${index})">➕ Add to Gallery</button>` : ''}
                        <button class="remove-btn" onclick="removeImage(${index})" ${isWeb ? 'style="margin-left: 10px;"' : ''}>${isWeb ? 'Clear' : 'Remove'}</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Handle form submission
        uploadForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const url = imageUrlInput.value.trim();
            if (url) {
                allImages.unshift({ 
                    url, 
                    name: url.split('/').pop().split('?')[0] || 'Image',
                    date: new Date().toISOString().split('T')[0],
                    source: 'Manual URL'
                });
                saveImages();
                imageUrlInput.value = '';
                filterImages(searchInput.value);
            }
        });

        // Event listeners
        searchInput.addEventListener('input', (e) => performSearch(e.target.value));
        webSearchCheckbox.addEventListener('change', () => {
            isWebSearch = webSearchCheckbox.checked;
            webToggle.classList.toggle('active', isWebSearch);
            if (isWebSearch) {
                updateSearchStats();
                renderGallery(); // Show empty web results initially
            } else {
                performSearch(searchInput.value);
            }
        });
        importChromeBtn.addEventListener('click', importChromeImages);
        importGoogleBtn.addEventListener('click', importGooglePhotos);
        clearAllBtn.addEventListener('click', () => {
            if (confirm('Delete all images?')) {
                allImages = [];
                filteredImages = [];
                saveImages();
                renderGallery();
            }
        });

        closeModal.addEventListener('click', () => imageModal.classList.remove('active'));
        imageModal.addEventListener('click', (e) => {
            if (e.target === imageModal) imageModal.classList.remove('active');
        });

        function openModal(index) {
            modalImage.src = filteredImages[index].url;
            imageModal.classList.add('active');
        }

        window.uploadWebImage = function(index) {
            const webImg = filteredImages[index];
            // Add to local gallery (upload)
            allImages.unshift({
                ...webImg,
                source: 'Uploaded from Unsplash'
            });
            saveImages();
            performSearch(searchInput.value); // Refresh
            // Optionally switch off web mode
            webSearchCheckbox.checked = false;
            webToggle.classList.remove('active');
        };

        function removeImage(index) {
            const webMode = webSearchCheckbox.checked;
            if (webMode) {
                // For web results, just clear all web
                webImages = [];
                performSearch(searchInput.value);
            } else {
                const globalIndex = allImages.findIndex(img => 
                    img.url === filteredImages[index].url && 
                    img.name === filteredImages[index].name
                );
                if (globalIndex !== -1) {
                    allImages.splice(globalIndex, 1); 
                    saveImages();
                    performSearch(searchInput.value);
                }
            }
        }

        function saveImages() {
            localStorage.setItem('galleryImages', JSON.stringify(allImages));
        }

        // Initial load
        renderGallery();
        updateSearchStats();
    </script>
</body>
</html>
